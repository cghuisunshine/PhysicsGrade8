<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>课时2.2 长度及其测量 互动练习</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #162032;
      --muted: #627087;
      --accent: #1967d2;
      --accent-soft: #eaf2ff;
      --border: #d7dfeb;
      --success: #107c41;
      --warn: #c27a00;
      --danger: #c5221f;
      --shadow: 0 18px 48px rgba(22, 32, 50, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(25, 103, 210, 0.08), transparent 30%),
        linear-gradient(180deg, #f7f9fd 0%, #eef3fa 100%);
      color: var(--text);
      font: 16px/1.65 "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 22px 18px 24px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border);
    }

    .brand {
      margin-bottom: 16px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .search {
      margin: 16px 0;
    }

    .search input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .progress-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #fff 0%, #f9fbff 100%);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #dfe7f2;
      overflow: hidden;
    }

    .progress-bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2c7be5 0%, #6aa6ff 100%);
      transition: width 180ms ease;
    }

    .sidebar-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }

    .sidebar-actions button,
    .topbar button,
    .question-actions button,
    .question-actions label {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }

    .toc {
      display: grid;
      gap: 12px;
    }

    .toc-group {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.74);
    }

    .toc-group h2 {
      margin: 0 0 10px;
      font-size: 0.98rem;
    }

    .toc-group a {
      display: block;
      padding: 6px 8px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .toc-group a:hover,
    .toc-group a.active {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .main {
      padding: 24px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .topbar-left {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(25, 103, 210, 0.98), rgba(29, 78, 216, 0.88));
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h2 {
      margin: 0 0 10px;
      font-size: 1.65rem;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      max-width: 900px;
      color: rgba(255, 255, 255, 0.88);
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    .hero-links a {
      color: #fff;
    }

    details.section {
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.section > summary {
      list-style: none;
      padding: 18px 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.06rem;
      border-bottom: 1px solid transparent;
    }

    details.section[open] > summary {
      border-bottom-color: var(--border);
      background: #fbfdff;
    }

    .section-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .question-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      padding: 18px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .question-head h3 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.4;
    }

    .badge {
      white-space: nowrap;
      border-radius: 999px;
      padding: 5px 10px;
      background: #eef4ff;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .question-render {
      color: var(--text);
    }

    .question-render img {
      max-width: 100%;
      height: auto;
    }

    .question-render table {
      display: block;
      overflow-x: auto;
      max-width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }

    .question-render th,
    .question-render td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      vertical-align: top;
    }

    .question-render blockquote {
      margin: 14px 0;
      padding: 12px 14px;
      background: #f8fbff;
      border-left: 4px solid var(--accent);
      border-radius: 12px;
    }

    .lang-stack {
      display: grid;
      gap: 14px;
    }

    .lang-block {
      border: 1px solid rgba(25, 103, 210, 0.12);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fbfdff;
    }

    .lang-block.secondary {
      background: #f8fafc;
    }

    .lang-label {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sub-translation {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9em;
      font-weight: 600;
    }

    .question-render .choice {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      margin: 8px 0;
      cursor: pointer;
      transition: 140ms ease;
      user-select: none;
    }

    .question-render .choice:hover {
      border-color: var(--accent);
      background: #f7fbff;
    }

    .question-render .choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(25, 103, 210, 0.08);
    }

    .question-render .choice.correct {
      border-color: var(--success);
      background: rgba(16, 124, 65, 0.08);
    }

    .question-render .choice.wrong {
      border-color: var(--danger);
      background: rgba(197, 34, 31, 0.08);
    }

    .workspace {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }

    .workspace textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .question-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .question-actions label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding-right: 14px;
    }

    .feedback {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--muted);
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.ok {
      border-color: rgba(16, 124, 65, 0.25);
      background: rgba(16, 124, 65, 0.08);
      color: var(--success);
    }

    .feedback.bad {
      border-color: rgba(197, 34, 31, 0.25);
      background: rgba(197, 34, 31, 0.08);
      color: var(--danger);
    }

    .feedback.note {
      border-color: rgba(194, 122, 0, 0.25);
      background: rgba(194, 122, 0, 0.09);
      color: var(--warn);
    }

    .answer-panel {
      display: none;
      margin-top: 6px;
      padding: 14px;
      border-radius: 14px;
      background: #f7fbff;
      border: 1px solid rgba(25, 103, 210, 0.16);
    }

    .answer-panel.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .hl {
      box-shadow: inset 0 -0.55em 0 rgba(255, 230, 140, 0.8);
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(88vw, 320px);
        z-index: 30;
        transform: translateX(-102%);
        transition: transform 160ms ease;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .main {
        padding: 16px;
      }
    }

    @media print {
      .sidebar,
      .topbar,
      .workspace,
      .hero-links {
        display: none !important;
      }

      .app {
        display: block;
      }

      .main {
        padding: 0;
      }

      .hero,
      details.section,
      .question-card {
        box-shadow: none;
        border-color: #bbb;
      }

      .answer-panel {
        display: block !important;
      }
    }
  </style>
</head>

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1 id="brandTitle">课时2.2 长度及其测量 互动练习</h1>
        <p id="brandDescription">从原卷版提取题目，从解析版提取答案与解答。可选择、作答、自查并记录进度。</p>

    <main class="main">

        <div class="topbar-left">

          <button type="button" id="hideAllAnswersBtn">隐藏全部解析</button>
          <button type="button" id="langToggleBtn">English</button>

        <button type="button" id="printBtn" onclick="window.print()">打印</button>
      </div>
      <section class="hero">
        <h2 id="heroTitle">课时2.2 长度及其测量 互动练习</h2>
        <p id="heroDescription">支持多选题自检、解析展开、文本作答、完成标记和本地保存。你可以先做原卷，再按题目单独查看解析。</p>
        <div class="hero-links">
          <a href="课时2.2 长度及其测量（原卷版）.html" id="originalLink">查看原卷版</a>
          <a href="课时2.2 长度及其测量（解析版）.html" id="solutionLink">查看解析版</a>
        </div>
      </section>
      <div id="sections"></div>
    </main>
  </div>

<p>错误：不遵守仪器的使用规则；读数、记录结果时粗心。</p></li>\n<li><p>误差不可避免，错误可以避免。</p></li>\n</ol>", "prompt_en_html": "<p>【典例1】关于误差，下列说法正确的是（　　）</p><p>A．选用更精密的测量仪器，可以消除实验误差</p><p>B．不遵守测量仪器的使用规则，会造成实验的误差</p><p>C．利用多次测量取平均值的方法，可以减小测量中的错误</p><p>D．误差是测量值与真实值的差异，在测量中，误差是无法消除的</p><ol type=\"1\">\n<li><p>误差：测量值与真实值之间的差异。</p></li>\n<li><p>误差产生原因：测量工具不够精确；测量方法不够完善；观察时受环境等不确定因素等。</p></li>\n<li><p>错误：不遵守仪器的使用规则；读数、记录结果时粗心。</p></li>\n<li><p>误差不可避免，错误可以避免。</p></li>\n</ol>", "answer_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：A．在测量中，误差是不可避免的，选用更精密的测量仪器，可以减小实验误差，但不能消除误差，故A错误；</p>\n<p>B．不遵守测量仪器的使用规则，会造成实验结果出现错误，是可以避免的，故B错误；</p>\n<p>C．利用多次测量取平均值的方法，可以减小测量中的误差，而错误是可以避免的，故C错误；</p>\n<p>D．误差是测量值与真实值的差异，由于测量工具、方法及测量者的原因，在测量中，误差是不可避免的，故D正确。</p>\n<p>故选D。</p>\n</blockquote><ol type=\"1\">\n<li><p>误差：测量值与真实值之间的差异。</p></li>\n<li><p>误差产生原因：测量工具不够精确；测量方法不够完善；观察时受环境等不确定因素等。</p></li>\n<li><p>错误：不遵守仪器的使用规则；读数、记录结果时粗心。</p></li>\n<li><p>误差不可避免，错误可以避免。</p></li>\n</ol>", "answer_en_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：A．在测量中，误差是不可避免的，选用更精密的测量仪器，可以减小实验误差，但不能消除误差，故A错误；</p>\n<p>B．不遵守测量仪器的使用规则，会造成实验结果出现错误，是可以避免的，故B错误；</p>\n<p>C．利用多次测量取平均值的方法，可以减小测量中的误差，而错误是可以避免的，故C错误；</p>\n<p>D．误差是测量值与真实值的差异，由于测量工具、方法及测量者的原因，在测量中，误差是不可避免的，故D正确。</p>\n<p>故选D。</p>\n</blockquote><ol type=\"1\">\n<li><p>误差：测量值与真实值之间的差异。</p></li>\n<li><p>误差产生原因：测量工具不够精确；测量方法不够完善；观察时受环境等不确定因素等。</p></li>\n<li><p>错误：不遵守仪器的使用规则；读数、记录结果时粗心。</p></li>\n<li><p>误差不可避免，错误可以避免。</p></li>\n</ol>", "answer_text": "【答案】D 【解答】解：A．在测量中，误差是不可避免的，选用更精密的测量仪器，可以减小实验误差，但不能消除误差，故A错误； B．不遵守测量仪器的使用规则，会造成实验结果出现错误，是可以避免的，故B错误； C．利用多次测量取平均值的方法，可以减小测量中的误差，而错误是可以避免的，故C错误； D．误差是测量值与真实值的差异，由于测量工具、方法及测量者的原因，在测量中，误差是不可避免的，故D正确。 故选D。 误差：测量值与真实值之间的差异。 误差产生原因：测量工具不够精确；测量方法不够完善；观察时受环境等不确定因素等。 错误：不遵守仪器的使用规则；读数、记录结果时粗心。 误差不可避免，错误可以避免。", "correct_answer": "D"}, {"id": "q008", "section": "问题三：误差与错误", "section_en": "Topic 3: errors and mistakes", "title": "【变式1-1】关于误差和错误的说法正确的是（ ）", "title_en": "【变式1-1】关于误差和错误的说法正确的是（ ）", "prompt_html": "<p>【变式1-1】关于误差和错误的说法正确的是（　　）</p><p>A．选用精密仪器，改进测量方法，可以减小误差</p><p>B．只要测量方法正确就不会产生误差</p><p>C．用天平测出1000个大头针的质量而计算出一个大头针的质量，可以消除误差</p><p>D．测量中要避免错误是不可能的</p>", "prompt_en_html": "<p>【变式1-1】关于误差和错误的说法正确的是（　　）</p><p>A．选用精密仪器，改进测量方法，可以减小误差</p><p>B．只要测量方法正确就不会产生误差</p><p>C．用天平测出1000个大头针的质量而计算出一个大头针的质量，可以消除误差</p><p>D．测量中要避免错误是不可能的</p>", "answer_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：A、选用精密仪器，改进测量方法，可以减小误差，故A正确；</p>\n<p>B、误差是客观存在的，测量方法正确也不可能避免误差，故B错误；</p>\n<p>C、用天平测出1000个大头针的质量而计算出一个大头针的质量，可以减小误差，但不能消除误差，故C错误；</p>\n<p>D、测量中错误是可以避免的，但误差是不能避免的，故D错误。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：A、选用精密仪器，改进测量方法，可以减小误差，故A正确；</p>\n<p>B、误差是客观存在的，测量方法正确也不可能避免误差，故B错误；</p>\n<p>C、用天平测出1000个大头针的质量而计算出一个大头针的质量，可以减小误差，但不能消除误差，故C错误；</p>\n<p>D、测量中错误是可以避免的，但误差是不能避免的，故D错误。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_text": "【答案】A 【解答】解：A、选用精密仪器，改进测量方法，可以减小误差，故A正确； B、误差是客观存在的，测量方法正确也不可能避免误差，故B错误； C、用天平测出1000个大头针的质量而计算出一个大头针的质量，可以减小误差，但不能消除误差，故C错误； D、测量中错误是可以避免的，但误差是不能避免的，故D错误。 故选：A。", "correct_answer": "A"}, {"id": "q009", "section": "问题三：误差与错误", "section_en": "Topic 3: errors and mistakes", "title": "【变式1-2】下列关于误差说法中正确的是（ ）", "title_en": "【变式1-2】下列关于误差说法中正确的是（ ）", "prompt_html": "<p>【变式1-2】下列关于误差说法中正确的是（　　）</p><p>A．测量时为了减小误差可以多估读几位</p><p>B．由于眼睛不可能估计的非常准，所以没有必要估读</p><p>C．测量的数值和真实值可能完全相同，所以误差是可以避免的</p><p>D．测量时通过多次测量求平均值的方法可以减小误差</p>", "prompt_en_html": "<p>【变式1-2】下列关于误差说法中正确的是（　　）</p><p>A．测量时为了减小误差可以多估读几位</p><p>B．由于眼睛不可能估计的非常准，所以没有必要估读</p><p>C．测量的数值和真实值可能完全相同，所以误差是可以避免的</p><p>D．测量时通过多次测量求平均值的方法可以减小误差</p>", "answer_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：A、测量时应该估读到最小刻度的下一位，即估读值，再多估读几位没有意义；故A错误；</p>\n<p>A、为了减小误差，要估读到最小刻度的下一位，这是有必要的；故B错误。</p>\n<p>C、误差是不可以避免的，只可以减小；故C错误；</p>\n<p>D、求多次测量的平均值是减小误差有效的方法之一；故D正确；</p>\n<p>故选：D。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：A、测量时应该估读到最小刻度的下一位，即估读值，再多估读几位没有意义；故A错误；</p>\n<p>A、为了减小误差，要估读到最小刻度的下一位，这是有必要的；故B错误。</p>\n<p>C、误差是不可以避免的，只可以减小；故C错误；</p>\n<p>D、求多次测量的平均值是减小误差有效的方法之一；故D正确；</p>\n<p>故选：D。</p>\n</blockquote>", "answer_text": "【答案】D 【解答】解：A、测量时应该估读到最小刻度的下一位，即估读值，再多估读几位没有意义；故A错误； A、为了减小误差，要估读到最小刻度的下一位，这是有必要的；故B错误。 C、误差是不可以避免的，只可以减小；故C错误； D、求多次测量的平均值是减小误差有效的方法之一；故D正确； 故选：D。", "correct_answer": "D"}]}, {"id": "section-4", "title": "【基础强化】", "titleEn": "Foundation practice", "questions": [{"id": "q010", "section": "【基础强化】", "section_en": "Foundation practice", "title": "1．如图请估测该瓶子的高约为（ ）", "title_en": "1．如图请估测该瓶子的高约为（ ）", "prompt_html": "<p>1．如图请估测该瓶子的高约为（　　）</p><p>A．2cm B．20cm C．50cm D．500cm</p>", "prompt_en_html": "<p>1．如图请估测该瓶子的高约为（　　）</p><p>A．2cm B．20cm C．50cm D．500cm</p>", "answer_html": "<blockquote>\n<p>【答案】B</p>\n<p>【解答】解：</p>\n<p>手掌的宽度约10cm左右，由图知，瓶子的高度是手掌宽度的2倍左右，所以高度约20cm左右。</p>\n<p>故选：B。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】B</p>\n<p>【解答】解：</p>\n<p>手掌的宽度约10cm左右，由图知，瓶子的高度是手掌宽度的2倍左右，所以高度约20cm左右。</p>\n<p>故选：B。</p>\n</blockquote>", "answer_text": "【答案】B 【解答】解： 手掌的宽度约10cm左右，由图知，瓶子的高度是手掌宽度的2倍左右，所以高度约20cm左右。 故选：B。", "correct_answer": "B"}, {"id": "q011", "section": "【基础强化】", "section_en": "Foundation practice", "title": "2．生活中常用人体的某个部位来估测长度，如中学生两臂左右平伸时，两手中指尖之间的距离为1庹（tuǒ）。按此规定，“1庹”的长度最接近（ ）", "title_en": "2．生活中常用人体的某个部位来估测长度，如中学生两臂左右平伸时，两手中指尖之间的距离为1庹（tuǒ）。按此规定，“1庹”的长度最接近（ ）", "prompt_html": "<p>2．生活中常用人体的某个部位来估测长度，如中学生两臂左右平伸时，两手中指尖之间的距离为1庹（tuǒ）。按此规定，“1庹”的长度最接近（　　）</p><p>A．15mm B．15cm C．15dm D．15m</p>", "prompt_en_html": "<p>2．生活中常用人体的某个部位来估测长度，如中学生两臂左右平伸时，两手中指尖之间的距离为1庹（tuǒ）。按此规定，“1庹”的长度最接近（　　）</p><p>A．15mm B．15cm C．15dm D．15m</p>", "answer_html": "<blockquote>\n<p>【答案】C</p>\n<p>【解答】解：成年人的身高在170cm左右，“一庹”的长度是指两臂左右平伸时两手中指尖之间的距离，约等于身高，在170cm＝17dm左右，故C正确。</p>\n<p>故选：C。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】C</p>\n<p>【解答】解：成年人的身高在170cm左右，“一庹”的长度是指两臂左右平伸时两手中指尖之间的距离，约等于身高，在170cm＝17dm左右，故C正确。</p>\n<p>故选：C。</p>\n</blockquote>", "answer_text": "【答案】C 【解答】解：成年人的身高在170cm左右，“一庹”的长度是指两臂左右平伸时两手中指尖之间的距离，约等于身高，在170cm＝17dm左右，故C正确。 故选：C。", "correct_answer": "C"}, {"id": "q012", "section": "【基础强化】", "section_en": "Foundation practice", "title": "3．小明利用分度值1mm的刻度尺测量一个物体的长度，四 因此误差不是由于测量方法错误造成的，故A错误；</p>\n<p>BCD、选用更精密的测量仪器，改进实验方法，多次测量取平均值，熟练实验技能等都可以减小误差，但不能消除误差，故BC错误，D正确。</p>\n<p>故选：D。</p>\n</blockquote>", "answer_text": "【答案】D 【解答】解：A、误差就是在正确测量的情况下，测量值与真实值之间存在的差异，因此误差不是由于测量方法错误造成的，故A错误； BCD、选用更精密的测量仪器，改进实验方法，多次测量取平均值，熟练实验技能等都可以减小误差，但不能消除误差，故BC错误，D正确。 故选：D。", "correct_answer": "D"}, {"id": "q015", "section": "【基础强化】", "section_en": "Foundation practice", "title": "6．如图所示，铅笔长度测量结果记录正确的是（ ）", "title_en": "6．如图所示，铅笔长度测量结果记录正确的是（ ）", "prompt_html": "<p>6．如图所示，铅笔长度测量结果记录正确的是（　　）</p><p>A．12.0cm B．12.2cm C．12.02cm D．12.20cm</p>", "prompt_en_html": "<p>6．如图所示，铅笔长度测量结果记录正确的是（　　）</p><p>A．12.0cm B．12.2cm C．12.02cm D．12.20cm</p>", "answer_html": "<blockquote>\n<p>【答案】C</p>\n<p>【解答】解：图示刻度尺1cm又分为10个小刻度，故最小刻度值为1mm；末端刻度值为12.02cm，物体长度为12.02cm，故ABD错误，C正确。</p>\n<p>故选：C。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】C</p>\n<p>【解答】解：图示刻度尺1cm又分为10个小刻度，故最小刻度值为1mm；末端刻度值为12.02cm，物体长度为12.02cm，故ABD错误，C正确。</p>\n<p>故选：C。</p>\n</blockquote>", "answer_text": "【答案】C 【解答】解：图示刻度尺1cm又分为10个小刻度，故最小刻度值为1mm；末端刻度值为12.02cm，物体长度为12.02cm，故ABD错误，C正确。 故选：C。", "correct_answer": "C"}, {"id": "q016", "section": "【基础强化】", "section_en": "Foundation practice", "title": "7．物理实验室常用的测量长度的工具是（ ）", "title_en": "7．物理实验室常用的测量长度的工具是（ ）", "prompt_html": "<p>7．物理实验室常用的测量长度的工具是（　　）</p><p>A．天平 B．量筒 C．秒表 D．刻度尺</p>", "prompt_en_html": "<p>7．物理实验室常用的测量长度的工具是（　　）</p><p>A．天平 B．量筒 C．秒表 D．刻度尺</p>", "answer_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：</p>\n<p>在日常生活和物理实验中，</p>\n<p>A、天平用来测量物体质量的大小。故A选项不符合题意；</p>\n<p>B、量筒是测量液体体积的工具。故B选项不符合题意；</p>\n<p>C、秒表是测量时间的基本工具。故C选项不符合题意；</p>\n<p>D、刻度尺是长度测量的基本工具。故D选项符合题意。</p>\n<p>故选：D。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】D</p>\n<p>【解答】解：</p>\n<p>在日常生活和物理实验中，</p>\n<p>A、天平用来测量物体质量的大小。故A选项不符合题意；</p>\n<p>B、量筒是测量液体体积的工具。故B选项不符合题意；</p>\n<p>C、秒表是测量时间的基本工具。故C选项不符合题意；</p>\n<p>D、刻度尺是长度测量的基本工具。故D选项符合题意。</p>\n<p>故选：D。</p>\n</blockquote>", "answer_text": "【答案】D 【解答】解： 在日常生活和物理实验中， A、天平用来测量物体质量的大小。故A选项不符合题意； B、量筒是测量液体体积的工具。故B选项不符合题意； C、秒表是测量时间的基本工 作1.00cm，右端在3.1cm和3.2cm之间，偏向3.2cm，读作3.17cm，所以橡皮的长度为L＝3.17cm﹣1.00cm＝2.17cm； 故ABD错误，C正确。 故选：C。", "correct_answer": "C"}, {"id": "q026", "section": "【素养提升】", "section_en": "Literacy extension", "title": "6．为了准确测量人教版八年级上册课本的长，下列测量工具最合适的是（ ）", "title_en": "6．为了准确测量人教版八年级上册课本的长，下列测量工具最合适的是（ ）", "prompt_html": "<p>6．为了准确测量人教版八年级上册课本的长，下列测量工具最合适的是（　　）</p><p>A．量程：30cm 分度值：0.1cm</p><p>B．量程：30cm 分度值：1cm</p><p>C．量程：15cm 分度值：0.1cm</p><p>D．量程：15cm 分度值：1cm</p>", "prompt_en_html": "<p>6．为了准确测量人教版八年级上册课本的长，下列测量工具最合适的是（　　）</p><p>A．量程：30cm 分度值：0.1cm</p><p>B．量程：30cm 分度值：1cm</p><p>C．量程：15cm 分度值：0.1cm</p><p>D．量程：15cm 分度值：1cm</p>", "answer_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：物理课本的长和宽要求分别约为长26厘米，宽18厘米，要求精确到毫米，所以选用量程最少为30cm，分度值为0.1cm的刻度尺可以一次测量，所以BCD的量程不合要求、A符合要求。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：物理课本的长和宽要求分别约为长26厘米，宽18厘米，要求精确到毫米，所以选用量程最少为30cm，分度值为0.1cm的刻度尺可以一次测量，所以BCD的量程不合要求、A符合要求。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_text": "【答案】A 【解答】解：物理课本的长和宽要求分别约为长26厘米，宽18厘米，要求精确到毫米，所以选用量程最少为30cm，分度值为0.1cm的刻度尺可以一次测量，所以BCD的量程不合要求、A符合要求。 故选：A。", "correct_answer": "A"}, {"id": "q027", "section": "【素养提升】", "section_en": "Literacy extension", "title": "7．图中为甲、乙两把刻度尺同时测量一个木块的长度，则甲、乙两刻度尺的读数分别为（ ）", "title_en": "7．图中为甲、乙两把刻度尺同时测量一个木块的长度，则甲、乙两刻度尺的读数分别为（ ）", "prompt_html": "<p>7．图中为甲、乙两把刻度尺同时测量一个木块的长度，则甲、乙两刻度尺的读数分别为（　　）</p><p>A．甲3.80cm，乙3.80cm B．甲2.80cm，乙2.8cm</p><p>C．甲2.80cm，乙2.80cm D．甲2.8cm，乙2.8cm</p>", "prompt_en_html": "<p>7．图中为甲、乙两把刻度尺同时测量一个木块的长度，则甲、乙两刻度尺的读数分别为（　　）</p><p>A．甲3.80cm，乙3.80cm B．甲2.80cm，乙2.8cm</p><p>C．甲2.80cm，乙2.80cm D．甲2.8cm，乙2.8cm</p>", "answer_html": "<blockquote>\n<p>【答案】B</p>\n<p>【解答】解：刻度尺甲的分度值是1mm，估读一位，记作3.80cm﹣1.00cm＝2.80cm；</p>\n<p>刻度尺乙的分度值是1cm，估读一位，记作3.8cm﹣1.0cm＝2.8cm，故ACD错误，B正确。</p>\n<p>故选：B。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】B</p>\n<p>【解答】解：刻度尺甲的分度值是1mm，估读一位，记作3.80cm﹣1.00cm＝2.80cm；</p>\n<p>刻度尺乙的分度值是1cm，估读一位，记作3.8cm﹣1.0cm＝2.8cm，故ACD错误，B正确。</p>\n<p>故选：B。</p>\n</blockquote>", "answer_text": "【答案】B 【解答】解：刻度尺甲的分度值是1mm，估读一位，记作3.80cm﹣1.00cm＝2.80cm； 刻度尺乙的分度值是1cm，估读一位，记作3.8cm﹣1.0cm＝2.8cm，故ACD错误，B正确。 故选：B。", "correct_answer": "B"}, {"id": "q028", "section": "【素养提升】", "section_en": "Literacy extension", "title": "8．下列关于误差的说法中，正确的是（ ）", "title_en": "8．下列关于误差的说法中，正确的是（ ）", "prompt_html": "<p>8．下列关于误差的说法中，正确的是（　　）</p><p>A．误差的产生是与人和测量工具有关</p><p>B．使用精密的测量工具就可以避免误差</p><p>C．测量方法错误是产生误差的原因</p><p>D．误差可以避免，而错误不可避免</p>", "prompt_en_html": "<p>8．下列关于误差的说法中，正确的是（　　）</p><p>A．误差的产生是与人和测量工具有关</p><p>B．使用精密的测量工具就可以避免误差</p><p>C．测量方法错误是产生误差的原因</p><p>D．误差可以避免，而错误不可避免</p>", "answer_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：</p>\n<p>A、误差的产生与测量工具有关，与测量的人和测量方法也是有关的，如在估读时，误差就与测量的人有关，故A正确；</p>\n<p>B、使用精密的测量工具可以减小误差，但不能避免误差，故B错误；</p>\n<p>C、测量时，受所用仪器和测量方法的限制，测量值和真实值之间总会有差别，这就是误差；测量错误是由于不遵守测量仪器的使用规则，读数时粗心等造成的，即测量方法错误不是产生误差的原因，故C错误；</p>\n<p>D、误差是不可以避免，而错误是可以避免，故D错误。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_en_html": "<blockquote>\n<p>【答案】A</p>\n<p>【解答】解：</p>\n<p>A、误差的产生与测量工具有关，与测量的人和测量方法也是有关的，如在估读时，误差就与测量的人有关，故A正确；</p>\n<p>B、使用精密的测量工具可以减小误差，但不能避免误差，故B错误；</p>\n<p>C、测量时，受所用仪器和测量方法的限制，测量值和真实值之间总会有差别，这就是误差；测量错误是由于不遵守测量仪器的使用规则，读数时粗心等造成的，即测量方法错误不是产生误差的原因，故C错误；</p>\n<p>D、误差是不可以避免，而错误是可以避免，故D错误。</p>\n<p>故选：A。</p>\n</blockquote>", "answer_text": "【答案】A 【解答】解： A、误差的产生与测量工具有关，与测量的人和测量方法也是有关的，如在估读时，误差就与测量的人有关，故A正确； B、使用精密的测量工具可以减小误差，但不能避免误差，故B错误； C、测量时，受所用仪器和测量方法的限制，测量值和真实值之间总会有差别，这就是误差；测量错误是由于不遵守测量仪器的使用规则，读数时粗心等造成的，即测量方法错误不是产生误差的原因，故C错误； D、误差是不可以避免，而错误是可以避免，故D错误。 故选：A。", "correct_answer": "A"}, {"id": "q029", "section": "【素养提升】", "section_en": "Literacy extension", "title": "9．（1）在测铅笔长度时，如图所示的两种读数方式正确的是 图，铅笔的长度为 cm；", "title_en": "9．（1）在测铅笔长度时，如图所示的两种读数方式正确的是 图，铅笔的长度为 cm；", "prompt_html": "<p>9．（1）在测铅笔长度时，如图所示的两种读数方式正确的是\n<u>　　</u>图，铅笔的长度为 <u>　　</u>cm；</p><blockquote>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfgAAABoCAYAAAAdOeKIAAAABGdBTUEAALGPC/xhBQAAAAlwSFlzAAAOwgAADsIBFShKgAAAC6BJREFUeF7t3S2M1EAYxvGzuJMoQlBIJBJJgkEiwYEjp3BIJBJxAonEX0iQSBCXIJEkZ5DIss/elpttO7vTvp228/b/Sybsdu 20；（5）偏大。</p>\n<p>【解答】解：</p>\n<p>（1）正确测量方法：找一支圆铅笔，把细铜丝拉直，将金属丝在铅笔上依次紧密绕适当的圈数n，由以上可知，没有必要的步骤是A，错误的步骤是C，应改为：用细铜丝线圈的长度L<sub>1</sub>除以细铜丝的圈数n，即得细铜丝直径d＝<img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABYAAAApCAYAAAAxmNlDAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAALiMAAC4jAXilP3YAAAEFSURBVEhL7ZPdCoMwDEZ7KYwxKAPf/z3XZn7TpH+pVjsvxjwQrDE9zaIzdBI/LjbGSPRSGL4hBZdY+DPxWu1hMeq6xTVBs5i70EKjlgf1Jw1cYuEUMaQcGl0dr5GJHTn/kvBL9ghKx568d11SMI0o/SOY4UZ2fNB9yPJ7YzkggjvGdRmL9D+PKvyaUIP6gN8aBdbxFqz5Llsne1zLjKcu5S6osOaXzMFi1FfEqUBGE2VZUIIDI7EnnmUuAPlswVSV5HjXnI865m9Y6wPF5XHIh1HEz9VRaGBTqV1jh3gfq+LBWnqO9qONP/4WNqs0WYu8SZxziYVuMQQcjJbT2D76IL8mJnoDhQYnZATYsZMAAAAASUVORK5CYILoj4HkvJjnvZEAAABre2hzdAAAAAAxMzAyODMzAAAAa3toc3QAAAAA\" style=\"width:0.22917in;height:0.42708in\" alt=\"菁优网-jyeoo\">。</p>\n<p>（2）故合理的顺序为：DEBC或DBEC；</p>\n<p>（3）在测量原理和方法一样的情况下，误差是由于测量者的人为客观原因及测量工具本身的准确程度引起的，例如：</p>\n<p>A、人在绕线的时候，可能用力的大小不同，造成松紧程度不同，会产生误差，故A符合题意；</p>\n<p>B、刻度尺本身刻度不均匀，在测量中会产生误差，故B符合题意；</p>\n<p>C、读数时由于粗心，小数点记错位置，属于测量错误，故C不符合题意。</p>\n<p>故选：AB；</p>\n<p>（4）由图知：刻度尺上1cm之间有10个小格，所以一个小格代表的长度是0.1cm＝1mm，即此刻度尺的分度值为1mm；</p>\n<p>线圈左侧与10.00cm对齐，右侧与15.00cm对齐，所以线圈的长度为L<sub>1</sub>＝15.00cm﹣10.00cm＝5.00cm；</p>\n<p>金属丝的直径为d＝<img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABYAAAApCAYAAAAxmNlDAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAALiMAAC4jAXilP3YAAAEFSURBVEhL7ZPdCoMwDEZ7KYwxKAPf/z3XZn7TpH+pVjsvxjwQrDE9zaIzdBI/LjbGSPRSGL4hBZdY+DPxWu1hMeq6xTVBs5i70EKjlgf1Jw1cYuEUMaQcGl0dr5GJHTn/kvBL9ghKx568d11SMI0o/SOY4UZ2fNB9yPJ7YzkggjvGdRmL9D+PKvyaUIP6gN8aBdbxFqz5Llsne1zLjKcu5S6osOaXzMFi1FfEqUBGE2VZUIIDI7EnnmUuAPlswVSV5HjXnI865m9Y6wPF5XHIh1HEz9VRaGBTqV1jh3gfq+LBWnqO9qONP/4WNqs0WYu8SZxziYVuMQQcjJbT2D76IL8mJnoDhQYnZATYsZMAAAAASUVORK5CYILoj4HkvJjnvZEAAABre2hzdAAAAAAxMzAyODMzAAAAa3toc3QAAAAA\" style=\"width:0.22917in;height:0.42708in\" alt=\"菁优网-jyeoo\">＝<img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADUAAAAjCAYAAAA0aUL2AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAALiMAAC4jAXilP3YAAAIcSURBVFhH7ZV/j4M     function t(key) {
      return uiText[currentLang][key] || key;
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch (error) {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function saveLanguage() {
      localStorage.setItem(languageKey, currentLang);
    }

    function sectionId(section) {
      return section.id;
    }

    function choiceLetters(answer) {
      if (!answer || !/^[A-Z]+$/.test(answer)) {
        return [];
      }
      return [...new Set(answer.split(''))].sort();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function render() {
      applyUiLanguage();
      renderSections();
      renderToc();
      bindGlobalEvents();
      updateProgress();
      applySearch();
      highlightActiveLink();
      window.addEventListener('scroll', highlightActiveLink, { passive: true });
    }

    function getSectionTitle(section) {
      if (currentLang === 'en') {
        return section.titleEn || section.title;
      }
      if (currentLang === 'both') {
        return `${section.title} / ${section.titleEn || section.title}`;
      }
      return section.title;
    }

    function getQuestionTitle(question) {
      if (currentLang === 'en') {
        return question.title_en || question.title;
      }
      if (currentLang === 'both') {
        return `${question.title} / ${question.title_en || question.title}`;
      }
      return question.title;
    }

    function renderBilingualBody(zhHtml, enHtml, interactive = false) {
      const primaryBody = interactive
        ? `<div class="choice-surface">${zhHtml}</div>`
        : zhHtml;
      return `
        <div class="lang-stack">
          <div class="lang-block primary">
            <div class="lang-label">中文</div>
            ${primaryBody}
          </div>
          <div class="lang-block secondary">
            <div class="lang-label">English</div>
            ${enHtml}
          </div>
        </div>
      `;
    }

    function getPromptHtml(question) {
      if (currentLang === 'en') {
        return question.prompt_en_html || question.prompt_html;
      }
      if (currentLang === 'both') {
        return renderBilingualBody(
          question.prompt_html,
          question.prompt_en_html || question.prompt_html,
          true,
        );
      }
      return question.prompt_html;
    }

    function getAnswerHtml(question) {
      if (currentLang === 'en') {
        return question.answer_en_html || question.answer_html;
      }
      if (currentLang === 'both') {
        return renderBilingualBody(
          question.answer_html,
          question.answer_en_html || question.answer_html,
        );
      }
      return question.answer_html;
    }

    function renderSections() {
      sectionsRoot.innerHTML = data.sections.map(section => {
        const cards = section.questions.map(question => renderQuestionCard(question)).join('');
        const sectionTitle = getSectionTitle(section);
        return `
          <details class="section" open id="${sectionId(section)}">
            <summary>${escapeHtml(sectionTitle)} <span class="badge">${section.questions.length} ${t('questionsUnit')}</span></summary>
            <div class="section-body">${cards}</div>
          </details>
        `;
      }).join('');

      document.querySelectorAll('.question-card').forEach(card => {
        hydrateCard(card);
      });
    }

    function renderQuestionCard(question) {
      const saved = state[question.id] || {};
      const completed = saved.completed ? 'checked' : '';
      const note = escapeHtml(saved.note || '');
      const title = getQuestionTitle(question);
      const promptHtml = getPromptHtml(question);
      const answerHtml = getAnswerHtml(question);
      return `
        <article class="question-card" id="${question.id}" data-question-id="${question.id}" data-answer="${escapeHtml(question.correct_answer || '')}">
          <div class="question-head">
            <h3>${escapeHtml(title)}</h3>
            <span class="badge">${escapeHtml(question.id.toUpperCase())}</span>
          </div>
          <div class="question-render">${promptHtml}</div>
          <div class="workspace">
            <textarea placeholder="${escapeHtml(t('notePlaceholder'))}" data-role="note">${note}</textarea>
            <div class="question-actions">
              <button type="button" data-action="check">${t('checkAnswer')}</button>
              <button type="button" data-action="toggle-answer">${t('showAnswer')}</button>
              <label><input type="checkbox" data-role="done" ${completed} /> ${t('markDone')}</label>
            </div>
            <div class="feedback" data-role="feedback"></div>
            <div class="answer-panel" data-role="answer">${answerHtml}</div>
          </div>
        </article>
      `;
    }

    function renderToc() {
      tocRoot.innerHTML = data.sections.map(section => {
        const sectionTitle = getSectionTitle(section);
        const links = section.questions.map(question => `
          <a href="#${question.id}" data-link="${question.id}">${escapeHtml(getQuestionTitle(question))}</a>
        `).join('');
        return `
          <div class="toc-group" data-section-link="${section.id}">
            <h2><a href="#${section.id}" data-link="${section.id}">${escapeHtml(sectionTitle)}</a></h2>
            ${links}
          </div>
        `;
      }).join('');
    }

    function hydrateCard(card) {
      const id = card.dataset.questionId;
      const note = card.querySelector('[data-role="note"]');
      const done = card.querySelector('[data-role="done"]');
      const feedback = card.querySelector('[data-role="feedback"]');
      const answerPanel = card.querySelector('[data-role="answer"]');
      const toggleBtn = card.querySelector('[data-action="toggle-answer"]');
      const checkBtn = card.querySelector('[data-action="check"]');
      const correct = card.dataset.answer.trim();

      note.addEventListener('input', () => {
        state[id] = state[id] || {};
        state[id].note = note.value;
        saveState();
      });

      done.addEventListener('change', () => {
        state[id] = state[id] || {};
        state[id].completed = done.checked;
        saveState();
        updateProgress();
        applySearch();
      });

      toggleBtn.addEventListener('click', () => {
        const show = !answerPanel.classList.contains('show');
        answerPanel.classList.toggle('show', show);
        toggleBtn.textContent = show ? t('hideAnswer') : t('showAnswer');
      });

      checkBtn.addEventListener('click', () => {
        const selected = [...card.querySelectorAll('.choice.selected')].map(node => node.dataset.choice).sort();
        feedback.className = 'feedback show';

        if (selected.length && /^[A-Z]+$/.test(correct)) {
          const expected = choiceLetters(correct);
          const ok = selected.join('') === expected.join('');
          feedback.classList.add(ok ? 'ok' : 'bad');
          feedback.textContent = ok
            ? `${t('correct')} ${t('correctAnswer')}：${correct}`
            : `${t('currentSelection')}：${selected.join('') || t('noChoice')}；${t('correctAnswer')}：${correct}`;
          markChoices(card, expected, selected);
          return;
        }

        if (correct) {
          feedback.classList.add('note');
          feedback.textContent = `${t('referenceAnswer')}：${correct}。${t('pleaseSelfCheck')}`;
        } else {
          feedback.classList.add('note');
          feedback.textContent = t('selfCheck');
        }
      });

      decorateChoices(card);
    }

    function decorateChoices(card) {
      const answer = card.dataset.answer.trim();
      const multiple = /^[A-Z]+$/.test(answer) && answer.length > 1;
      const blocks = currentLang === 'both'
        ? [...card.querySelectorAll('.question-render .choice-surface p, .question-render .choice-surface li')]
        : [...card.querySelectorAll('.question-render p, .question-render li')];
      blocks.forEach(block => {
        const text = block.innerText.trim();
        const match = text.match(/^([A-H])[．.]/);
        if (!match) {
          return;
        }
        block.classList.add('choice');
        block.dataset.choice = match[1];
        block.addEventListener('click', () => {
          if (!multiple) {
            card.querySelectorAll('.choice').forEach(node => node.classList.remove('selected'));
          }
          block.classList.toggle('selected');
        });
      });
    }

    function markChoices(card, expected, selected) {
      card.querySelectorAll('.choice').forEach(node => {
        const letter = node.dataset.choice;
        node.classList.remove('correct', 'wrong');
        if (expected.includes(letter)) {
          node.classList.add('correct');
        } else if (selected.includes(letter)) {
          node.classList.add('wrong');
        }
      });
    }

    function updateProgress() {
      const total = data.sections.reduce((sum, section) => sum + section.questions.length, 0);
      let done = 0;
      data.sections.forEach(section => {
        section.questions.forEach(question => {
          if (state[question.id] && state[question.id].completed) {
            done += 1;
          }
        });
      });
      progressText.textContent = `${done} / ${total}`;
      progressFill.style.width = total ? `${(done / total) * 100}%` : '0%';
    }

    function applyUiLanguage() {
      document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
      const pageTitle = currentLang === 'en'
        ? (data.titleEn || data.title)
        : currentLang === 'both'
          ? `${data.title} / ${data.titleEn || data.title}`
          : data.title;
      const pageDescription = currentLang === 'en'
        ? (data.descriptionEn || data.description)
        : currentLang === 'both'
          ? `${data.description} / ${data.descriptionEn || data.description}`
          : data.description;
      document.title = pageTitle;
      document.getElementById('brandTitle').textContent = pageTitle;
      document.getElementById('brandDescription').textContent = pageDescription;
      document.getElementById('heroTitle').textContent = pageTitle;
      document.getElementById('heroDescription').textContent = t('heroDescription');
      document.getElementById('progressLabel').textContent = t('progressLabel');
      document.getElementById('searchInput').placeholder = t('searchPlaceholder');
      document.getElementById('toggleSidebarBtn').textContent = t('sidebar');
      document.getElementById('expandAllBtn').textContent = t('expandAll');
      document.getElementById('collapseAllBtn').textContent = t('collapseAll');
      document.getElementById('showAllAnswersBtn').textContent = t('showAllAnswers');
      document.getElementById('hideAllAnswersBtn').textContent = t('hideAllAnswers');
      document.getElementById('printBtn').textContent = t('print');
      document.getElementById('langToggleBtn').textContent = t('langToggle');
      document.getElementById('resetProgressBtn').textContent = t('resetProgress');
      document.getElementById('showTodoBtn').textContent = todoOnly ? t('showAll') : t('showTodo');
      document.getElementById('originalLink').textContent = t('originalPaper');
      document.getElementById('solutionLink').textContent = t('solutionPaper');
    }

    function bindGlobalEvents() {
      document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
        document.body.classList.toggle('sidebar-open');
      });

      document.getElementById('expandAllBtn').addEventListener('click', () => {
        document.querySelectorAll('details.section').forEach(node => node.open = true);
      });

      document.getElementById('collapseAllBtn').addEventListener('click', () => {
        document.querySelectorAll('details.section').forEach(node => node.open = false);
      });

      document.getElementById('showAllAnswersBtn').addEventListener('click', () => {
        document.querySelectorAll('[data-role="answer"]').forEach(node => node.classList.add('show'));
        document.querySelectorAll('[data-action="toggle-answer"]').forEach(node => node.textContent = t('hideAnswer'));
      });

      document.getElementById('hideAllAnswersBtn').addEventListener('click', () => {
        document.querySelectorAll('[data-role="answer"]').forEach(node => node.classList.remove('show'));
        document.querySelectorAll('[data-action="toggle-answer"]').forEach(node => node.textContent = t('showAnswer'));
      });

      document.getElementById('showTodoBtn').addEventListener('click', event => {
        todoOnly = !todoOnly;
        event.currentTarget.textContent = todoOnly ? t('showAll') : t('showTodo');
        applySearch();
      });

      document.getElementById('langToggleBtn').addEventListener('click', () => {
        currentLang = currentLang === 'zh'
          ? 'en'
          : currentLang === 'en'
            ? 'both'
            : 'zh';
        saveLanguage();
        applyUiLanguage();
        renderSections();
        renderToc();
        updateProgress();
        applySearch();
        highlightActiveLink();
      });

      document.getElementById('resetProgressBtn').addEventListener('click', () => {
        const message = currentLang === 'en'
          ? 'Clear all saved answers and progress for this page?'
          : '确定清空本页保存的作答和进度吗？';
        if (!window.confirm(message)) {
          return;
        }
        localStorage.removeItem(storageKey);
        window.location.reload();
      });

      searchInput.addEventListener('input', applySearch);
    }

    function applySearch() {
      const keyword = searchInput.value.trim().toLowerCase();
      document.querySelectorAll('.hl').forEach(node => node.classList.remove('hl'));

      document.querySelectorAll('.question-card').forEach(card => {
        const id = card.dataset.questionId;
        const text = card.innerText.toLowerCase();
        const done = state[id] && state[id].completed;
        const matchKeyword = !keyword || text.includes(keyword);
        const matchTodo = !todoOnly || !done;
        const visible = matchKeyword && matchTodo;
        card.classList.toggle('hidden', !visible);
        if (visible && keyword) {
          card.querySelector('.question-head h3').classList.add('hl');
        }
      });

      document.querySelectorAll('details.section').forEach(section => {
        const cards = [...section.querySelectorAll('.question-card')];
        const visibleCards = cards.filter(card => !card.classList.contains('hidden'));
        section.classList.toggle('hidden', visibleCards.length === 0);
      });

      document.querySelectorAll('.toc-group').forEach(group => {
        const links = [...group.querySelectorAll('a[data-link]')];
        let visible = false;
        links.forEach(link => {
          const target = document.getElementById(link.dataset.link);
          const isVisible = target && !target.classList.contains('hidden');
          link.classList.toggle('hidden', !isVisible);
          if (isVisible) {
            visible = true;
          }
        });
        group.classList.toggle('hidden', !visible);
      });
    }

    function highlightActiveLink() {
      const allLinks = document.querySelectorAll('.toc a[data-link]');
      allLinks.forEach(link => link.classList.remove('active'));
      const cards = [...document.querySelectorAll('.question-card:not(.hidden)')];
      let activeId = null;
      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        if (rect.top <= 180 && rect.bottom >= 180) {
          activeId = card.id;
          break;
        }
      }
      if (!activeId) {
        const section = [...document.querySelectorAll('details.section:not(.hidden)')].find(node => {
          const rect = node.getBoundingClientRect();
          return rect.top <= 160 && rect.bottom >= 160;
        });
        activeId = section ? section.id : null;
      }
      if (activeId) {
        const link = document.querySelector(`.toc a[data-link="${activeId}"]`);
        if (link) {
          link.classList.add('active');
        }
      }
    }

    render();
  </script>
